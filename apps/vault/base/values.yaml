server:
  standalone:
    enabled: false

  ha:
    enabled: false

  dataStorage:
    enabled: true
    size: 5Gi

  auditStorage:
    enabled: false

  raft:
    enabled: true
    setNodeId: true

  service:
    type: ClusterIP

  ingress:
    enabled: false

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

ui:
  enabled: true