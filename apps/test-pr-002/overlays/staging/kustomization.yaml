apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test-pr-002-staging

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: test-pr-002

images:
- name: test-pr-002
  newName: ghcr.io/emmexgdc/test-pr-002
  newTag: latest

labels:
- pairs:
    environment: staging
