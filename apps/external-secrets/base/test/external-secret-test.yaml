apiVersion: v1
kind: Namespace
metadata:
  name: eso-test
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-test-secret
  namespace: eso-test
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-test-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: homelab/test
        property: username
    - secretKey: password
      remoteRef:
        key: homelab/test
        property: password