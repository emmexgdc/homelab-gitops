apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-api-staging

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: demo-api

images:
- name: demo-api
  newName: nginxinc/nginx-unprivileged
  newTag: latest

labels:
- pairs:
    environment: staging
