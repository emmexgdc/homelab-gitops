apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-plat
  labels:
    app: python-plat
spec:
  selector:
    matchLabels:
      app: python-plat
  template:
    metadata:
      labels:
        app: python-plat
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: python-plat
        image: python-plat
        ports:
        - name: http
          containerPort: 5000
        envFrom:
        - configMapRef:
            name: python-plat-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /api/v1/healthz
            port: http
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /api/v1/healthz
            port: http
          initialDelaySeconds: 20
