apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: recommendation-prod

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: recommendation

images:
- name: recommendation
  newName: ghcr.io/emmexgdc/recommendation
  newTag: latest

labels:
- pairs:
    environment: prod
  includeSelectors: false