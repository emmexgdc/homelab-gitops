apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: recommendation-staging

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: recommendation

images:
- name: recommendation
  newName: ghcr.io/emmexgdc/recommendation
  newTag: 97fa0fc

labels:
- pairs:
    environment: staging
