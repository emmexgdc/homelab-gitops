apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test-react-prod

resources:
- ../../base
- configmap.yaml
- ingress.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: test-react

images:
- name: test-react
  newName: ghcr.io/emmexgdc/test-react
  newTag: latest

labels:
- pairs:
    environment: prod
