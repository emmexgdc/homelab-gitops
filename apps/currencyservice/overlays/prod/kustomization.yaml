apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: currencyservice-prod

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: currencyservice

images:
- name: currencyservice
  newName: ghcr.io/emmexgdc/currencyservice
  newTag: latest

labels:
- pairs:
    environment: prod
  includeSelectors: false