apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cart-prod

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: cart

images:
- name: gcr.io/google-samples/microservices-demo/cartservice
  newTag: v0.10.1

labels:
- pairs:
    environment: prod
  includeSelectors: false