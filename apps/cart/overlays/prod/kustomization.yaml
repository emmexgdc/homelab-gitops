apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cart-prod

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: cart

images:
- name: cart
  newName: ghcr.io/emmexgdc/cart
  newTag: "1559824"

labels:
- pairs:
    environment: prod
