apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cart-staging

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: cart

images:
- name: cart
  newName: ghcr.io/emmexgdc/cart
  newTag: v0.10.1

labels:
- pairs:
    environment: staging
  includeSelectors: false