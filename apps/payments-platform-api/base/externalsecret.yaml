apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payments-platform-api
  labels:
    app: payments-platform-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: payments-platform-api-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: apps/payments-platform-api
