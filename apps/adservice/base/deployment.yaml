apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  labels:
    app: adservice
spec:
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      labels:
        app: adservice
    spec:
      containers:
      - name: adservice
        image: adservice
        ports:
        - containerPort: 9555
        envFrom:
        - configMapRef:
            name: adservice-config
        resources:
          requests:
            cpu: 200m
            memory: 180Mi
          limits:
            cpu: 300m
            memory: 300Mi
        readinessProbe:
          grpc:
            port: 9555
          initialDelaySeconds: 20
        livenessProbe:
          grpc:
            port: 9555
          initialDelaySeconds: 20