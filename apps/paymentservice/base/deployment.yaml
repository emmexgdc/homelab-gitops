apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  labels:
    app: paymentservice
spec:
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      containers:
      - name: paymentservice
        image: paymentservice
        ports:
        - containerPort: 50051
        envFrom:
        - configMapRef:
            name: paymentservice-config
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10
        livenessProbe:
          grpc:
            port: 50051
          initialDelaySeconds: 10