apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-pr-001
  labels:
    app: test-pr-001
spec:
  selector:
    matchLabels:
      app: test-pr-001
  template:
    metadata:
      labels:
        app: test-pr-001
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: test-pr-001
        image: test-pr-001
        ports:
        - name: http
          containerPort: 8080
        envFrom:
        - configMapRef:
            name: test-pr-001-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
