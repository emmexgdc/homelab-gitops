apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: test-platform-app-prod
resources:
  - ../../base
  - configmap.yaml
  - ingress.yaml
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: test-platform-app
images:
  - name: test-platform-app
    newName: emmexgdc/test-platform-app
    newTag: latest
labels:
  - pairs:
      environment: prod
