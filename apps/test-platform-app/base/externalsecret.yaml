apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-platform-app
  labels:
    app: test-platform-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: test-platform-app-secret
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: apps/test-platform-app
