apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: checkout-prod

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: checkout

images:
- name: checkout
  newName: ghcr.io/emmexgdc/checkout
  newTag: latest

labels:
- pairs:
    environment: prod
  includeSelectors: false