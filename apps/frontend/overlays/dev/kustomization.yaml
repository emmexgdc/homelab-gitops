apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend-dev

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: frontend

images:
- name: frontend
  newName: ghcr.io/emmexgdc/frontend
  newTag: e37e6ac
- name: gcr.io/google-samples/microservices-demo/frontend
  newTag: v0.10.1

labels:
- pairs:
    environment: dev
