apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend-staging

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: frontend

images:
- name: gcr.io/google-samples/microservices-demo/frontend
  newTag: v0.10.1

commonLabels:
  environment: staging