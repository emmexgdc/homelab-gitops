apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend-staging

resources:
- ../../base
- configmap.yaml
- ingress.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: frontend

images:
- name: frontend
  newName: ghcr.io/emmexgdc/frontend
  newTag: "5093472"

labels:
- pairs:
    environment: staging
