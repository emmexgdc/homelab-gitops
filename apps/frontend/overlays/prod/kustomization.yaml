apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend-prod

resources:
- ../../base
- configmap.yaml
- ingress.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: frontend

images:
- name: frontend
  newName: ghcr.io/emmexgdc/frontend
  newTag: e37e6ac

labels:
- pairs:
    environment: prod
  includeSelectors: false