apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: productcatalog-staging

resources:
- ../../base
- configmap.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: productcatalog

images:
- name: productcatalog
  newName: ghcr.io/emmexgdc/productcatalog
  newTag: df0fdb0

labels:
- pairs:
    environment: staging
