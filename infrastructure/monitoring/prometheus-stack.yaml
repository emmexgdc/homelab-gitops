apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "70.*"
    helm:
      values: |
        grafana:
          adminPassword: admin123   # Change this to a secure password in production
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            hosts:
            - grafana.homelab.emmexgdc.uk
            tls:
            - secretName: grafana-tls
              hosts:
              - grafana.homelab.emmexgdc.uk
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
            hosts:
            - prometheus.homelab.emmexgdc.uk
            tls:
            - secretName: prometheus-tls
              hosts:
              - prometheus.homelab.emmexgdc.uk
        alertmanager:
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
            hosts:
            - alertmanager.homelab.emmexgdc.uk
            tls:
            - secretName: alertmanager-tls
              hosts:
              - alertmanager.homelab.emmexgdc.uk
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true