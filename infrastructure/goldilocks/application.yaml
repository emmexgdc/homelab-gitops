apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://charts.fairwinds.com/stable
    chart: goldilocks
    targetRevision: "9.*"

  destination:
    server: https://kubernetes.default.svc
    namespace: goldilocks

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true