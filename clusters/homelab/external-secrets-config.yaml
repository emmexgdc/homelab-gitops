apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/emmexgdc/homelab-gitops
    targetRevision: main
    path: apps/external-secrets/base

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true