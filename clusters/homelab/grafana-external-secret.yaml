apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-external-secret
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/emmexgdc/homelab-gitops
    targetRevision: main
    path: apps/external-secrets/grafana

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true