apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/emmexgdc/homelab-gitops
    targetRevision: main
    path: apps/external-secrets/test

  destination:
    server: https://kubernetes.default.svc
    namespace: eso-test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true