apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-production
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.30.0
    helm:
      values: |
        server:
          standalone:
            enabled: true

          ha:
            enabled: true
            replicas: 1
            raft:
              enabled: true
              setNodeId: true

          dataStorage:
            enabled: true
            size: 5Gi

          raft:
            enabled: true
            setNodeId: true

          service:
            type: ClusterIP

          ingress:
            enabled: false

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

        ui:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true